<!doctype html>
<html lang="en" data-theme="ember">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1b2026">
    <meta name="description" content="TaskFocus — a calm, focused task manager.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TaskFocus">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
    <link rel="stylesheet" href="./styles/app.css">
    <title>TaskFocus</title>
  </head>
  <body>
    <noscript>TaskFocus needs JavaScript enabled.</noscript>

    <div class="app-shell" id="app-shell">
      <main id="view" tabindex="-1" aria-live="polite"></main>

      <button class="fab" id="fab" type="button" aria-label="Add task">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
      </button>

      <nav class="tabbar" aria-label="Main navigation">
        <a class="tab" data-route="tasks" href="#tasks" aria-label="Tasks">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M9 6h11M9 12h11M9 18h11"></path>
            <path d="m3.5 6 1.3 1.3L7 4.8M3.5 12l1.3 1.3L7 10.8M3.5 18l1.3 1.3L7 16.8"></path>
          </svg>
          <span>Tasks</span>
        </a>
        <a class="tab" data-route="calendar" href="#calendar" aria-label="Calendar">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M5 3v3M19 3v3M3.5 9h17"></path>
            <rect x="3.5" y="5" width="17" height="16" rx="3"></rect>
            <path d="M8 13h.01M12 13h.01M16 13h.01M8 17h.01M12 17h.01"></path>
          </svg>
          <span>Calendar</span>
        </a>
        <a class="tab" data-route="settings" href="#settings" aria-label="Settings">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1A1.7 1.7 0 0 0 9 4.6 1.7 1.7 0 0 0 10 3v-.2h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z"></path>
          </svg>
          <span>Settings</span>
        </a>
      </nav>
    </div>

    <div id="sheets" aria-live="polite"></div>
    <div id="toasts" class="toasts" aria-live="assertive" aria-atomic="true"></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
